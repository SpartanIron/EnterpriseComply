kind = "web"
previewPath = "/"
title = "ColorComply"
version = "1.0.0"
id = "artifacts/c2s-ciop"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19222

[services.development]
run = "pnpm --filter @workspace/c2s-ciop run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/c2s-ciop", "run", "build" ]
publicDir = "artifacts/c2s-ciop/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19222"
BASE_PATH = "/"
