[build]
builder = "NIXPACKS"
buildCommand = "pnpm install && BASE_PATH=/ pnpm --filter @workspace/c2s-ciop run build && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "node --import=@swc-node/register/esm-register artifacts/api-server/src/main.ts"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
